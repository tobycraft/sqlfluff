nested_case_unclosed:
  sql: SELECT CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN
    CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN
    1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE
    WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN
    CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN
    1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE
    WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN 0
  pins: 'Native-vs-legacy build-path edge battery: 30-deep nested CASE left unclosed.'
  xfail:
    python_vs_rust: 'Known rust-core gap (found when this battery gained the python_vs_rust
      leg): on an unclosed 30-deep nested CASE the Rust core burns through its maximum
      iteration limit (3,000,000) and panics with PanicException, where Python recovers
      an unparsable tree in ~0.1s - an error-recovery iteration blowup in the table-driven
      matcher.'
