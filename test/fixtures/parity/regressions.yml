# Parity test cases - data for test/core/parser/parity/cases_test.py.
# See test/fixtures/parity/README.md for the schema and strictness contract.

ansi_grant_all_masking_policies:
  sql: GRANT SELECT ON ALL MASKING POLICIES IN SCHEMA s TO r
  expect: clean_tree
  pins: ansi grammar referenced the POLICIES keyword without registering it (fixed by adding
    POLICIES to dialect_ansi_keywords.py).
ansi_grant_future_masking_policies:
  sql: GRANT SELECT ON FUTURE MASKING POLICIES IN SCHEMA s TO r
  expect: clean_tree
  pins: FUTURE variant of the same POLICIES keyword gap.
ansi_grant_all_file_formats:
  sql: GRANT SELECT ON ALL FILE FORMATS IN SCHEMA s TO r
  expect: clean_tree
  pins: ansi grammar referenced the FORMATS keyword without registering it, the same dangling-ref
    class as the POLICIES gap (fixed by adding FORMATS to dialect_ansi_keywords.py).
mysql_exchange_partition_table_reference:
  sql: ALTER TABLE t EXCHANGE PARTITION p WITH TABLE t2 WITH VALIDATION
  dialect: mysql
  expect: clean_tree
  pins: mysql EXCHANGE PARTITION had Ref('TableReference') - a typo for TableReferenceSegment.
postgres_alter_foreign_table_column_keyword:
  sql: ALTER FOREIGN TABLE ft ALTER COLUMN c OPTIONS (ADD opt 'v')
  dialect: postgres
  expect: clean_tree
  pins: postgres ALTER FOREIGN TABLE had Ref('COLUMN') - a segment ref where the COLUMN keyword
    was intended.
parser_created_segments_drop_token_trim_chars:
  sql: SET @errmsg = 'x';
  dialect: mysql
  pins: Parser-created segments inherit only quoted_value/escape_replacements/casefold from
    the lexed token - NOT trim_chars - matching RawSegment.from_result_segments; Rust forwards
    the token's trim_chars ('@',).
