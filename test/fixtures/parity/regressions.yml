# Parity test cases - data for test/core/parser/parity/cases_test.py.
# See test/fixtures/parity/README.md for the schema and strictness contract.

ansi_grant_all_masking_policies:
  sql: GRANT SELECT ON ALL MASKING POLICIES IN SCHEMA s TO r
  expect: clean_tree
  pins: ansi grammar referenced the POLICIES keyword without registering it (fixed by adding
    POLICIES to dialect_ansi_keywords.py).
ansi_grant_future_masking_policies:
  sql: GRANT SELECT ON FUTURE MASKING POLICIES IN SCHEMA s TO r
  expect: clean_tree
  pins: FUTURE variant of the same POLICIES keyword gap.
ansi_grant_all_file_formats:
  sql: GRANT SELECT ON ALL FILE FORMATS IN SCHEMA s TO r
  expect: clean_tree
  pins: ansi grammar referenced the FORMATS keyword without registering it, the same dangling-ref
    class as the POLICIES gap (fixed by adding FORMATS to dialect_ansi_keywords.py).
mysql_exchange_partition_table_reference:
  sql: ALTER TABLE t EXCHANGE PARTITION p WITH TABLE t2 WITH VALIDATION
  dialect: mysql
  expect: clean_tree
  pins: mysql EXCHANGE PARTITION had Ref('TableReference') - a typo for TableReferenceSegment.
postgres_alter_foreign_table_column_keyword:
  sql: ALTER FOREIGN TABLE ft ALTER COLUMN c OPTIONS (ADD opt 'v')
  dialect: postgres
  expect: clean_tree
  pins: postgres ALTER FOREIGN TABLE had Ref('COLUMN') - a segment ref where the COLUMN keyword
    was intended.
parser_created_segments_drop_token_trim_chars:
  sql: SET @errmsg = 'x';
  dialect: mysql
  pins: Parser-created segments inherit only quoted_value/escape_replacements/casefold from
    the lexed token - NOT trim_chars - matching RawSegment.from_result_segments; Rust forwards
    the token's trim_chars ('@',).
partial_match_failure_keeps_children:
  sql: SELECT CASE
  pins: GREEDY_ONCE_STARTED Sequence failing partway must keep the already-matched children
    typed (the SELECT keyword), wrapping only the unmatched tail as unparsable - the Rust
    side used to drop accumulated child_matches/insert_segments in its error MatchResult,
    crashing rule ST05 (#8116).
stray_closing_bracket_dialect_bracket_set:
  sql: SELECT 1 -} FROM t
  dialect: snowflake
  xfail:
    python_vs_rust: 'Rust''s unparsable-recovery region for the unmatched dialect-specific
      closing bracket (snowflake''s exclude-bracket ''-}'') does not stop at the bracket:
      it keeps consuming subsequent tokens (FROM, the table reference) as raw words inside
      the same unparsable segment, where Python recovers immediately after the stray bracket
      and parses the FROM clause normally.'
  pins: Dialect-specific stray closing bracket (snowflake '-}') recovery never closes.
int_typed_indentation_config:
  sql: SELECT a FROM t JOIN u USING (a)
  configs:
    indentation.indented_joins: 1
  expect: clean_tree
  pins: RustParser's Conditional-grammar indentation config only kept values already typed
    as bool, silently dropping int-typed truthy settings such as indented_joins = 1 (fixed
    by coercing every indentation-section value with bool(), matching ParseContext.from_config).
found_token_class_name:
  sql: SELECT ] FROM t
  dialect: flink
  pins: Rust's code-matched tokens carried class_name RawSegment, so the "Found <...>" unparsable
    message named the found token's class as RawSegment where Python names it CodeSegment
    (fixed by giving Token::code_token its own CodeSegment class_name instead of reusing
    raw_token's).
found_token_repr_quoting:
  sql: SELECT '
  pins: Rust rendered a found token's raw with Rust's escape_debug quoting instead of Python's
    repr() quote-selection rules (prefer single quotes, switch to double quotes only when
    the content has a single quote and no double quote) - fixed by giving Token's Display
    its own py_repr helper that follows Python's str repr() rules.
expected_message_curtailment:
  sql: SELECT AS x
  dialect: databricks
  pins: Rust rendered grammar reprs in full in "Expected:" unparsable messages, where Python's
    BaseGrammar.__repr__ curtails each element to 40 characters and the joined list to 100
    (helpers/string.py curtail_string) - fixed by porting the same two-level truncation into
    GrammarContext::grammar_repr.
sequence_found_message_no_trailing_period:
  sql: SELECT STRUCT<a INT64(1)
  dialect: bigquery
  pins: Canonical case for the Found-message trailing-period gap (fixed by dropping the
    trailing period from the Sequence "to start sequence"/"after ..." error-message formats
    in sequence.rs).
sqlite_nothing_here_expected_message:
  sql: "WITH cte AS (\n t\n)\nSELECT"
  dialect: sqlite
  expect: tree
  pins: Bracketed content matching (bracketed.rs) always blamed a content/closing-bracket
    gap on the generic GREEDY-leftover fallback ('Nothing here.'), even when the gap was
    actually caused by the sole content element (here, SelectableGrammar inside the CTE's
    parens) failing to match at all - fixed by tracking how many child matches existed
    before content parsing began, so a content element that never got off the ground is
    reported with Python's specific "to start sequence"/"after X" message instead.
materialize_curly_cross_silent_recovery:
  sql: COPY t FROM STDIN (FORMAT {-
  dialect: materialize
  expect: error
  pins: The Rust Anything() grammar (core.rs match_bracket_recursively, used for the
    COPY ... options content) reached end-of-input inside an unresolved nested bracket
    of a different type (materialize's COPY FORMAT '{' crossed with the outer, also
    unclosed, '(') and silently treated wherever it stopped as the closing bracket,
    instead of raising like Python's resolve_bracket does whenever a bracket it opened
    is never closed - fixed by making match_bracket_recursively return an error in that
    case instead of a fabricated match.
tsql_cast_structure:
  sql: select CAST(0X0 uniqueidentifier);
  dialect: tsql
  xfail:
    python_vs_rust: 'Rust does not recognise tsql''s AS-less CAST(literal type) shorthand
      cast syntax: Python parses it as a function call with a binary_literal argument and
      a data_type, while Rust parses only CAST as a bare column reference and folds the remainder
      of the statement into an unparsable segment.'
  pins: tsql CAST(literal type) shorthand (no AS) grammar gap.
materialize_webhook_overlapping_matches:
  sql: "(\n ) ( );\nCREATE SOURCE my_webhook_source IN CLUSTER my_cluster FROM WEBHOOK\n BODY\
    \ FORMAT JSON\n (\n (\n my_webhook_share"
  dialect: materialize
  expect: error
  pins: 'Same root cause as materialize_curly_cross_silent_recovery - core.rs''s
    match_bracket_recursively silently fabricated a close for deeply crossed/unmatched
    brackets instead of raising, and downstream the resulting malformed match ended up
    with overlapping child matches, tripping the Python-side builder''s invariant check
    (ValueError). Fixed by the same change: an unresolved bracket now raises immediately
    instead of ever reaching the builder.'
depth_guard_error_position:
  sql: SELECT CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN
    1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1
    THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN
    CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE
    WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN
    1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1
    THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN
    CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN 0 END END END END
    END END END END END END END END END END END END END END END END END END END END END END
    END END END END END END END END END END END END END END
  xfail:
    python_vs_rust: Both engines raise SQLParseError 'Maximum parse depth exceeded (limit
      600)...' for this deeply nested CASE expression, but Python attaches the real source
      position (line 1, position 630) while Rust's exception defaults to (0, 0).
  pins: Missing position marker on Rust's max-parse-depth exception.
nested_case_unclosed:
  sql: SELECT CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN
    1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1
    THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN
    CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE
    WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN
    1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN CASE WHEN 1 THEN 0
  xfail:
    python_vs_rust: For this deeply nested, unclosed CASE expression, Python parses through
      to a complete tree, while Rust raises a PanicException (parser exceeded maximum iteration
      limit of 3000000), hitting a different guard than the max-parse-depth guard and producing
      an exception where Python produces none.
  pins: Rust iteration-limit panic vs Python full parse on unclosed deep CASE nesting.
raw_block_survives:
  sql: '{% raw %}SELECT {{ not_a_var }}{% endraw %} FROM t'
  templater: jinja
  context:
    col: a
    table: t
  pins: Templated-context variant of found_token_class_name - resolved by the same code_token
    class_name fix (the found '{' token's class name now matches Python's CodeSegment in
    this jinja raw-block case too).
