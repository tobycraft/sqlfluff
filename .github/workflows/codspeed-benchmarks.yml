################################
## Performance Benchmarks      ##
################################
#
# Manually triggered workflow that benchmarks a specific commit.
#
# Key design principle
# ─────────────────────
# Two concerns are kept strictly separate:
#
#   • Benchmark infrastructure (test files, build.rs, this workflow)
#     → always taken from the HEAD of this workflow's branch.
#
#   • Library under test (Python package, Rust source to compile)
#     → taken from commit_sha.
#
# This means the benchmarks can be run against any old commit, even ones that
# pre-date the test files or the shared .cache fixture path.
#
# Usage (GitHub UI → Actions → Performance Benchmarks → Run workflow):
#   commit_sha: the full or abbreviated SHA to benchmark, e.g. "abc1234"
#
# Job graph:
#
#   fetch-tpc-fixtures          rust-parser-bench
#   (uploads artifact)          (no TPC fixtures needed; starts immediately)
#          │
#    ┌─────┴────────────────────┐
#    ▼                          ▼
#  python-benchmarks         rust-tpc-benchmarks
#  (matrix × 4 in parallel)  (matrix × 4 in parallel)
#  test_lex_tpch              lex_tpch
#  test_parse_tpch            parse_tpch
#  test_lex_tpcds             lex_tpcds
#  test_parse_tpcds           parse_tpcds
#          │                          │
#          └──────────┬───────────────┘
#                     ▼
#              bench-summary
#              (aggregates all stats)
#
# Python benchmarks run under stock Valgrind callgrind.  The --codspeed flag
# is kept so that pytest-codspeed injects CALLGRIND_START/STOP_INSTRUMENTATION
# around each benchmark body, scoping the instruction count to the hot path only
# (--instr-atstart=no keeps startup overhead out of the measurement).
#
# Rust benchmarks use iai-callgrind, which manages Valgrind internally and
# produces per-function instruction counts with setup code excluded from
# measurement.  The iai-callgrind-runner binary must be installed at a version
# that exactly matches the iai-callgrind library in Cargo.toml; the install
# step extracts the resolved version from `cargo metadata` automatically.
#
# A bench-summary job downloads all per-job stat artifacts and prints a
# combined report at the end of the workflow.
#
name: Performance Benchmarks

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to check out and benchmark'
        required: true
        type: string

concurrency:
  group: benchmarks-${{ inputs.commit_sha }}
  cancel-in-progress: false

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Fetch TPC-H (22 queries) and TPC-DS (99 queries) via the Rust build script
  # on this branch.  Always runs against the workflow branch HEAD — never the
  # target SHA — so build.rs is always the version that writes to
  # .cache/tpc-fixtures/ (the shared location).
  # ─────────────────────────────────────────────────────────────────────────────
  fetch-tpc-fixtures:
    name: Fetch TPC fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "sqlfluffrs"
          cache-on-failure: true

      - name: Generate Rust dialect files
        run: |
          uv pip install --system -e .
          python utils/rustify.py build

      - name: Fetch TPC fixtures
        working-directory: sqlfluffrs
        run: cargo build -p sqlfluffrs_benchmarks --features fetch

      - name: Upload TPC fixtures artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Python benchmarks — one matrix job per benchmark.
  #
  # Benchmark infrastructure (test files, conftest.py) comes from the workflow
  # branch.  The sqlfluff library under test is installed from commit_sha so
  # that we are measuring that commit's performance, not HEAD's.
  # ─────────────────────────────────────────────────────────────────────────────
  python-benchmarks:
    name: Python – ${{ matrix.benchmark }}
    runs-on: ubuntu-latest
    needs: fetch-tpc-fixtures
    strategy:
      fail-fast: false
      matrix:
        benchmark:
          - test_lex_tpch
          - test_parse_tpch
          - test_lex_tpcds
          - test_parse_tpcds

    steps:
      - name: Checkout workflow branch (benchmark infrastructure)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout target commit (library under test)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          path: target-sqlfluff
          fetch-depth: 1

      - name: Download TPC fixtures
        uses: actions/download-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install sqlfluff from target commit
        run: uv pip install --system ./target-sqlfluff

      - name: Install benchmark dependencies
        run: uv pip install --system pytest pytest-codspeed pytest-benchmark

      - name: Install Valgrind
        run: sudo apt-get update -q && sudo apt-get install -y valgrind

      - name: Run benchmark under Valgrind callgrind
        run: |
          mkdir -p /tmp/callgrind
          PYTHONHASHSEED=0 PYTHONMALLOC=malloc CODSPEED_ENV=runner \
          valgrind -q \
            --tool=callgrind \
            --callgrind-out-file=/tmp/callgrind/callgrind.out \
            --instr-atstart=no \
            --combine-dumps=yes \
            --dump-line=no \
            python -m pytest test/benchmarks/ -k ${{ matrix.benchmark }} --codspeed -v

      - name: Save instruction-count summary
        if: always()
        run: |
          mkdir -p /tmp/bench-stats
          {
            echo "Benchmark: ${{ matrix.benchmark }}"
            awk '/^summary:/ { printf "Instructions: %'"'"'d\n", $2 }' \
              /tmp/callgrind/callgrind.out
          } | tee /tmp/bench-stats/python-${{ matrix.benchmark }}.txt
          echo "──────────────────────────────────────"

      - name: Upload bench stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-stats-python-${{ matrix.benchmark }}
          path: /tmp/bench-stats/python-${{ matrix.benchmark }}.txt
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Rust parser_bench — iai-callgrind.
  #
  # iai-callgrind manages Valgrind internally: it builds the bench binary, then
  # the iai-callgrind-runner invokes each benchmark function once under
  # callgrind with --instr-atstart=no, so only the benchmark body is counted.
  # The runner version must exactly match the iai-callgrind library version.
  # ─────────────────────────────────────────────────────────────────────────────
  rust-parser-bench:
    name: Rust – parser_bench
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target commit (Rust source under test)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "sqlfluffrs"
          cache-on-failure: true

      - name: Generate Rust dialect files
        run: |
          uv pip install --system -e .
          python utils/rustify.py build

      - name: Install Valgrind
        run: sudo apt-get update -q && sudo apt-get install -y valgrind

      - name: Install iai-callgrind-runner
        working-directory: sqlfluffrs
        run: |
          version=$(cargo metadata --format-version 1 \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(next(p['version'] for p in m['packages'] if p['name']=='iai-callgrind'))")
          cargo install iai-callgrind-runner --version "$version"

      - name: Run parser_bench
        working-directory: sqlfluffrs
        run: |
          mkdir -p /tmp/bench-stats
          cargo bench --bench parser_bench 2>&1 | tee /tmp/bench-stats/rust-parser-bench.txt

      - name: Upload bench stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-stats-rust-parser-bench
          path: /tmp/bench-stats/rust-parser-bench.txt
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Rust tpc_bench — one matrix job per benchmark, iai-callgrind.
  #
  # The Rust source to compile comes from commit_sha.  build.rs is overlaid
  # from the workflow branch so that TPC_FIXTURES_DIR always resolves to
  # .cache/tpc-fixtures/ regardless of what the old commit's build.rs did.
  # If sqlfluffrs_benchmarks or tpc_bench did not exist in the target commit,
  # continue-on-error lets the remaining matrix jobs still report results.
  # ─────────────────────────────────────────────────────────────────────────────
  rust-tpc-benchmarks:
    name: Rust – ${{ matrix.benchmark }}
    runs-on: ubuntu-latest
    needs: fetch-tpc-fixtures
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        benchmark:
          - lex_tpch
          - parse_tpch
          - lex_tpcds
          - parse_tpcds

    steps:
      - name: Checkout target commit (Rust source under test)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1

      - name: Overlay current build.rs for fixture path compatibility
        run: |
          git fetch origin ${{ github.ref_name }} --depth=1
          git checkout FETCH_HEAD -- sqlfluffrs/sqlfluffrs_benchmarks/build.rs
        continue-on-error: true

      - name: Download TPC fixtures
        uses: actions/download-artifact@v4
        with:
          name: tpc-fixtures
          path: .cache/tpc-fixtures/

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            requirements_dev.txt
            pyproject.toml
            constraints/*.txt

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "sqlfluffrs"
          cache-on-failure: true

      - name: Generate Rust dialect files
        run: |
          uv pip install --system -e .
          python utils/rustify.py build

      - name: Install Valgrind
        run: sudo apt-get update -q && sudo apt-get install -y valgrind

      - name: Install iai-callgrind-runner
        working-directory: sqlfluffrs
        run: |
          version=$(cargo metadata --format-version 1 \
            | python3 -c "import sys,json; m=json.load(sys.stdin); print(next(p['version'] for p in m['packages'] if p['name']=='iai-callgrind'))")
          cargo install iai-callgrind-runner --version "$version"

      - name: Run ${{ matrix.benchmark }}
        working-directory: sqlfluffrs
        run: |
          mkdir -p /tmp/bench-stats
          cargo bench -p sqlfluffrs_benchmarks --bench tpc_bench -- ${{ matrix.benchmark }} \
            2>&1 | tee /tmp/bench-stats/rust-${{ matrix.benchmark }}.txt

      - name: Upload bench stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-stats-rust-tpc-${{ matrix.benchmark }}
          path: /tmp/bench-stats/rust-${{ matrix.benchmark }}.txt
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Aggregate all per-job stat artifacts into a single summary.
  # Runs even if individual bench jobs fail (if: always()).
  # ─────────────────────────────────────────────────────────────────────────────
  bench-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [python-benchmarks, rust-parser-bench, rust-tpc-benchmarks]
    if: always()

    steps:
      - name: Download all benchmark stats
        uses: actions/download-artifact@v4
        with:
          pattern: bench-stats-*
          merge-multiple: true
          path: bench-stats/

      - name: Print summary
        run: |
          echo "════════════════════════════════════════════════"
          echo "              Benchmark Summary"
          echo "════════════════════════════════════════════════"
          for f in $(ls bench-stats/*.txt 2>/dev/null | sort); do
            echo ""
            echo "── $(basename "$f" .txt) ──────────────────────"
            cat "$f"
          done
          echo ""
          echo "════════════════════════════════════════════════"
