########################################################
## Commit-Range Benchmark Workflow                    ##
## Parallelises over commits via a dynamic matrix.   ##
## Caches are warmed once in `setup` and restored     ##
## read-only in each parallel `benchmark` job.        ##
########################################################
name: Benchmark Commit Range

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository to benchmark (owner/repo)'
        required: true
        default: 'rubytobi/sqlfluff'
      branch:
        description: 'Branch to iterate (tip = HEAD)'
        required: true
        default: 'main'
      max_commits:
        description: 'Maximum number of commits to benchmark'
        required: false
        default: '10'

jobs:

  # ── 1. Baseline · cache warm-up · commit list ────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      commits:         ${{ steps.range.outputs.commits }}
      total:           ${{ steps.range.outputs.total }}
      merge_base:      ${{ steps.range.outputs.merge_base }}
      venv_key:        ${{ steps.keys.outputs.venv }}
      cargo_reg_key:   ${{ steps.keys.outputs.cargo_reg }}
      cargo_build_key: ${{ steps.keys.outputs.cargo_build }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      # ── Baseline: rubytobi/sqlfluff@main ──────────────────────────────────
      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          repository: rubytobi/sqlfluff
          ref: main
          path: baseline

      - name: Install baseline
        working-directory: baseline
        run: pip install -e "." pytest pytest-xdist -q

      - name: Baseline pytest
        id: bl-pytest
        working-directory: baseline
        run: |
          OUT=$(pytest test/ -m "parse_suite" -n auto -q --tb=no -p no:warnings --no-header 2>&1 || true)
          echo "$OUT"
          echo "passed=$(echo "$OUT"  | grep -oP '\d+(?= passed)' || echo 0)"         >> "$GITHUB_OUTPUT"
          echo "failed=$(echo "$OUT"  | grep -oP '\d+(?= failed)' || echo 0)"         >> "$GITHUB_OUTPUT"
          echo "duration=$(echo "$OUT" | grep -oP '(?<=in )\d+\.\d+s' | head -1 || echo n/a)" >> "$GITHUB_OUTPUT"

      - name: Baseline cargo bench
        working-directory: baseline/sqlfluffrs
        run: cargo bench --bench parser_bench 2>&1 | tee /tmp/baseline_bench.txt || true

      - name: Package baseline results
        env:
          BL_PASSED:   ${{ steps.bl-pytest.outputs.passed }}
          BL_FAILED:   ${{ steps.bl-pytest.outputs.failed }}
          BL_DURATION: ${{ steps.bl-pytest.outputs.duration }}
        run: |
          python3 - << 'PY'
          import json, re, os
          from pathlib import Path
          scale = {"ns": 1, "µs": 1_000, "ms": 1_000_000, "s": 1_000_000_000}
          bench = {}
          for m in re.finditer(
              r'^(\S[\w/]+)\s+time:\s+\[[\d.]+ \S+ ([\d.]+) ([a-zµ]+)',
              Path("/tmp/baseline_bench.txt").read_text(), re.M
          ):
              name, val, unit = m.group(1), float(m.group(2)), m.group(3)
              bench[name] = round(val * scale.get(unit, 1))
          e = os.environ
          data = {
              "pytest": {"passed": e["BL_PASSED"], "failed": e["BL_FAILED"], "duration": e["BL_DURATION"]},
              "bench":  bench,
          }
          Path("/tmp/baseline.json").write_text(json.dumps(data, indent=2))
          print(json.dumps(data, indent=2))
          PY

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline
          path: /tmp/baseline.json

      # ── Target repo ────────────────────────────────────────────────────────
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          path: target

      - name: Compute cache keys
        id: keys
        working-directory: target
        run: |
          VENV_KEY="venv-${{ runner.os }}-$(sha256sum pyproject.toml | cut -c1-16)"
          CARGO_REG_KEY="cargo-reg-${{ runner.os }}"
          CARGO_BUILD_KEY="cargo-build-${{ runner.os }}-$(find sqlfluffrs -name '*.rs' -o -name 'Cargo.toml' \
            | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -c1-16)"
          echo "venv=$VENV_KEY"                >> "$GITHUB_OUTPUT"
          echo "cargo_reg=$CARGO_REG_KEY"      >> "$GITHUB_OUTPUT"
          echo "cargo_build=$CARGO_BUILD_KEY"  >> "$GITHUB_OUTPUT"

      # Python venv — editable install at a fixed absolute path so all
      # matrix runners share the same path and the install stays valid.
      - name: Cache Python venv
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: /opt/sqlfluff-venv
          key: ${{ steps.keys.outputs.venv }}

      - name: Build Python venv
        if: steps.venv-cache.outputs.cache-hit != 'true'
        working-directory: target
        run: |
          python -m venv /opt/sqlfluff-venv
          /opt/sqlfluff-venv/bin/pip install -e "." pytest pytest-xdist -q

      # Cargo registry (downloaded crates) — shared, never changes mid-run.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.keys.outputs.cargo_reg }}

      # Cargo build artifacts — keyed on Rust source at HEAD so matrix jobs
      # get a warm incremental-compilation start.
      - name: Cache Rust build
        id: rust-cache
        uses: actions/cache@v4
        with:
          path: target/sqlfluffrs/target
          key: ${{ steps.keys.outputs.cargo_build }}

      - name: Warm Rust build
        if: steps.rust-cache.outputs.cache-hit != 'true'
        working-directory: target/sqlfluffrs
        run: cargo bench --bench parser_bench --no-run 2>&1

      # ── Commit list ────────────────────────────────────────────────────────
      - name: Resolve commit range
        id: range
        working-directory: target
        env:
          MAX_COMMITS: ${{ inputs.max_commits }}
        run: |
          git fetch origin main --depth=200 2>/dev/null || true
          MERGE_BASE=$(
            git merge-base HEAD "origin/main" 2>/dev/null \
            || git rev-parse "HEAD~${MAX_COMMITS}" 2>/dev/null \
            || git rev-list HEAD | tail -1
          )
          echo "Merge-base: $MERGE_BASE"
          COMMITS=$(
            git log --format="%H" "${MERGE_BASE}..HEAD" \
              | head -n "$MAX_COMMITS" | tac \
              | python3 -c "import sys, json; print(json.dumps(sys.stdin.read().split()))"
          )
          TOTAL=$(echo "$COMMITS" | python3 -c "import sys, json; print(len(json.load(sys.stdin)))")
          echo "commits=$COMMITS"             >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"                 >> "$GITHUB_OUTPUT"
          echo "merge_base=${MERGE_BASE:0:7}" >> "$GITHUB_OUTPUT"
          echo "Commits to benchmark: $TOTAL — $COMMITS"

  # ── 2. One parallel job per commit ───────────────────────────────────────
  benchmark:
    needs: setup
    strategy:
      matrix:
        sha: ${{ fromJson(needs.setup.outputs.commits) }}
      fail-fast: false
    runs-on: ubuntu-latest
    name: "${{ matrix.sha }}"

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ matrix.sha }}
          path: target

      # Restore caches read-only — matrix jobs must not overwrite each other's
      # cache entries, so we use cache/restore rather than cache.
      - name: Restore Python venv
        uses: actions/cache/restore@v4
        with:
          path: /opt/sqlfluff-venv
          key: ${{ needs.setup.outputs.venv_key }}

      - name: Restore Cargo registry
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ needs.setup.outputs.cargo_reg_key }}

      - name: Restore Rust build
        uses: actions/cache/restore@v4
        with:
          path: target/sqlfluffrs/target
          key: ${{ needs.setup.outputs.cargo_build_key }}

      - name: Run pytest
        id: pytest
        working-directory: target
        run: |
          OUT=$(/opt/sqlfluff-venv/bin/pytest test/ -m "parse_suite" -n auto -q \
                  --tb=no -p no:warnings --no-header 2>&1 || true)
          echo "$OUT"
          echo "passed=$(echo "$OUT"  | grep -oP '\d+(?= passed)' || echo 0)"         >> "$GITHUB_OUTPUT"
          echo "failed=$(echo "$OUT"  | grep -oP '\d+(?= failed)' || echo 0)"         >> "$GITHUB_OUTPUT"
          echo "duration=$(echo "$OUT" | grep -oP '(?<=in )\d+\.\d+s' | head -1 || echo n/a)" >> "$GITHUB_OUTPUT"

      - name: Run cargo bench
        working-directory: target/sqlfluffrs
        run: cargo bench --bench parser_bench 2>&1 | tee /tmp/bench.txt || true

      - name: Package result
        env:
          SHA:      ${{ matrix.sha }}
          PASSED:   ${{ steps.pytest.outputs.passed }}
          FAILED:   ${{ steps.pytest.outputs.failed }}
          DURATION: ${{ steps.pytest.outputs.duration }}
        run: |
          python3 - << 'PY'
          import json, re, os, subprocess
          from pathlib import Path
          e     = os.environ
          sha   = e["SHA"]
          scale = {"ns": 1, "µs": 1_000, "ms": 1_000_000, "s": 1_000_000_000}
          bench = {}
          for m in re.finditer(
              r'^(\S[\w/]+)\s+time:\s+\[[\d.]+ \S+ ([\d.]+) ([a-zµ]+)',
              Path("/tmp/bench.txt").read_text(), re.M
          ):
              name, val, unit = m.group(1), float(m.group(2)), m.group(3)
              bench[name] = round(val * scale.get(unit, 1))
          subject = subprocess.check_output(
              ["git", "-C", "target", "log", "-1", "--format=%s"], text=True
          ).strip()
          data = {
              "sha": sha, "short": sha[:7], "subject": subject,
              "pytest": {
                  "passed":   int(e.get("PASSED")   or 0),
                  "failed":   int(e.get("FAILED")   or 0),
                  "duration": e.get("DURATION", "n/a"),
              },
              "bench": bench,
          }
          Path("/tmp/result.json").write_text(json.dumps(data, indent=2))
          print(json.dumps(data, indent=2))
          PY

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.sha }}
          path: /tmp/result.json

  # ── 3. Collect results and write summary ─────────────────────────────────
  summarize:
    needs: [setup, benchmark]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Write job summary
        env:
          REPOSITORY: ${{ inputs.repository }}
          BRANCH:     ${{ inputs.branch }}
          TOTAL:      ${{ needs.setup.outputs.total }}
          MERGE_BASE: ${{ needs.setup.outputs.merge_base }}
          COMMITS:    ${{ needs.setup.outputs.commits }}
        run: |
          python3 - << 'PY'
          import json, os
          from pathlib import Path

          e          = os.environ
          repo       = e.get("REPOSITORY", "?")
          branch     = e.get("BRANCH", "?")
          total      = e.get("TOTAL", "?")
          merge_base = e.get("MERGE_BASE", "?")
          commits    = json.loads(e.get("COMMITS", "[]"))

          # Baseline
          bl_path  = Path("/tmp/artifacts/baseline/baseline.json")
          baseline = json.loads(bl_path.read_text()) if bl_path.exists() else {}
          bl_pt    = baseline.get("pytest", {})
          bl_bench = baseline.get("bench", {})

          # Commit results — load then re-order by commit list
          result_map = {}
          for d in Path("/tmp/artifacts").iterdir():
              f = d / "result.json"
              if f.exists():
                  r = json.loads(f.read_text())
                  result_map[r["sha"]] = r
          results = [result_map[sha] for sha in commits if sha in result_map]

          L = []
          def a(s=""): L.append(s)

          a("## Commit-Range Benchmark Report\n")
          a("| | |")
          a("|---|---|")
          a(f"| **Repository** | `{repo}` |")
          a(f"| **Branch** | `{branch}` |")
          a(f"| **Merge-base** | `{merge_base}` |")
          a(f"| **Commits benchmarked** | {len(results)} / {total} |")
          a()

          # ── Baseline section ───────────────────────────────────────────────
          a("### Baseline — `rubytobi/sqlfluff@main`\n")
          a("#### pytest `parse_suite`")
          a(f"Passed: **{bl_pt.get('passed','?')}** &nbsp; "
            f"Failed: **{bl_pt.get('failed','?')}** &nbsp; "
            f"Duration: {bl_pt.get('duration','?')}")
          if bl_bench:
              a()
              a("#### cargo bench")
              a("| Benchmark | Estimate (ns) |")
              a("|-----------|-------------:|")
              for name, ns in sorted(bl_bench.items()):
                  a(f"| `{name}` | {ns:,} |")
          a()

          # ── Per-commit pytest table ────────────────────────────────────────
          if not results:
              a("> No results collected.")
          else:
              a("### pytest `parse_suite` — per commit\n")
              a("| Commit | Subject | ✅ Passed | ❌ Failed | Duration |")
              a("|--------|---------|----------:|----------:|----------|")
              for r in results:
                  pt = r.get("pytest", {})
                  a(f"| `{r['short']}` | {r.get('subject','')[:60]} "
                    f"| {pt.get('passed','—')} | {pt.get('failed','—')} "
                    f"| {pt.get('duration','—')} |")

              # ── Per-commit cargo bench table ───────────────────────────────
              bench_rows  = [r for r in results if r.get("bench")]
              if bench_rows:
                  bench_names = sorted({k for r in bench_rows for k in r["bench"]})
                  a()
                  a("### cargo bench — per commit (ns vs baseline)\n")
                  a("| Commit | Subject | " + " | ".join(f"`{n}`" for n in bench_names) + " |")
                  a("|--------|---------|" + "|".join("---:" for _ in bench_names) + "|")
                  for r in bench_rows:
                      cells = []
                      for n in bench_names:
                          ns = r["bench"].get(n)
                          if ns is None:
                              cells.append("—")
                              continue
                          bns = bl_bench.get(n)
                          if bns:
                              pct  = (ns - bns) / bns * 100
                              icon = "🔺" if pct > 3 else ("🟢" if pct < -3 else "➖")
                              cells.append(f"{ns:,} {icon} ({pct:+.1f}%)")
                          else:
                              cells.append(f"{ns:,}")
                      a(f"| `{r['short']}` | {r.get('subject','')[:40]} | " + " | ".join(cells) + " |")

          Path(e["GITHUB_STEP_SUMMARY"]).write_text("\n".join(L) + "\n")
          print("Summary written.")
          PY
