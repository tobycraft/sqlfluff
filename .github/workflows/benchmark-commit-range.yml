########################################################
## Commit-Range Benchmark Workflow                    ##
## Runs existing pytests and cargo benchmarks across  ##
## a range of commits, compared against a fixed       ##
## baseline from rubytobi/sqlfluff@main.              ##
########################################################
name: Benchmark Commit Range

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository to benchmark (owner/repo)'
        required: true
        default: 'rubytobi/sqlfluff'
      branch:
        description: 'Branch to iterate (tip = HEAD)'
        required: true
        default: 'main'
      max_commits:
        description: 'Maximum number of commits to iterate (oldest → newest)'
        required: false
        default: '10'

jobs:
  benchmark:
    name: Benchmark ${{ inputs.repository }}@${{ inputs.branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:

      # ── Toolchains ───────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-reg-${{ runner.os }}

      # ── Baseline: rubytobi/sqlfluff@main ────────────────────────────────────
      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          repository: rubytobi/sqlfluff
          ref: main
          path: baseline

      - name: Install baseline Python package
        working-directory: baseline
        run: pip install -e "." pytest pytest-xdist -q

      - name: Run baseline pytests
        id: baseline-pytest
        working-directory: baseline
        run: |
          OUTPUT=$(pytest test/ -m "parse_suite" -n auto -q --tb=no -p no:warnings --no-header 2>&1 || true)
          echo "$OUTPUT"
          echo "passed=$(echo "$OUTPUT" | grep -oP '\d+(?= passed)' || echo 0)" >> "$GITHUB_OUTPUT"
          echo "failed=$(echo "$OUTPUT" | grep -oP '\d+(?= failed)' || echo 0)"  >> "$GITHUB_OUTPUT"
          echo "duration=$(echo "$OUTPUT" | grep -oP '(?<=in )\d+\.\d+s' | head -1 || echo n/a)" >> "$GITHUB_OUTPUT"

      - name: Run baseline cargo bench
        working-directory: baseline/sqlfluffrs
        run: |
          cargo bench --bench parser_bench 2>&1 | tee /tmp/baseline_bench.txt || true

      - name: Parse baseline bench results
        run: |
          python3 - << 'PY'
          import json, re
          scale = {"ns": 1, "µs": 1_000, "ms": 1_000_000, "s": 1_000_000_000}
          results = {}
          content = open("/tmp/baseline_bench.txt").read()
          for m in re.finditer(
              r'^(\S[\w/]+)\s+time:\s+\[[\d.]+ \S+ ([\d.]+) ([a-zµ]+)',
              content, re.M
          ):
              name, value, unit = m.group(1), float(m.group(2)), m.group(3)
              results[name] = round(value * scale.get(unit, 1))
          json.dump(results, open("/tmp/baseline_bench.json", "w"))
          print("Baseline bench:", json.dumps(results, indent=2))
          PY

      # ── Target repo ──────────────────────────────────────────────────────────
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          path: target

      - name: Resolve commit range
        id: range
        working-directory: target
        env:
          MAX_COMMITS: ${{ inputs.max_commits }}
        run: |
          git fetch origin main --depth=200 2>/dev/null || true
          MERGE_BASE=$(
            git merge-base HEAD "origin/main" 2>/dev/null \
            || git rev-parse "HEAD~${MAX_COMMITS}" 2>/dev/null \
            || git rev-list HEAD | tail -1
          )
          echo "Merge-base: $MERGE_BASE"
          git log --format="%H" "${MERGE_BASE}..HEAD" \
            | head -n "$MAX_COMMITS" | tac > /tmp/commits.txt
          TOTAL=$(wc -l < /tmp/commits.txt | tr -d ' ')
          echo "total=$TOTAL"                   >> "$GITHUB_OUTPUT"
          echo "merge_base=${MERGE_BASE:0:7}"   >> "$GITHUB_OUTPUT"
          echo "Commits to benchmark: $TOTAL"
          cat /tmp/commits.txt

      # ── Benchmark loop ───────────────────────────────────────────────────────
      - name: Benchmark each commit
        working-directory: target
        run: |
          > /tmp/results.jsonl
          PREV_SHA=""

          while IFS= read -r SHA; do
            SHORT="${SHA:0:7}"
            SUBJECT=$(git log -1 --format="%s" "$SHA")
            echo "::group::[$SHORT] $SUBJECT"
            git checkout --quiet "$SHA"

            # ── Python install ─────────────────────────────────────────────
            INSTALL_OK="true"
            if ! pip install -e "." pytest pytest-xdist -q 2>&1 | tail -3; then
              echo "::warning::pip install failed at $SHORT — skipping"
              INSTALL_OK="false"
            fi

            PYTEST_PASSED="0"
            PYTEST_FAILED="0"
            PYTEST_DURATION="n/a"
            BENCH_JSON="{}"

            if [[ "$INSTALL_OK" == "true" ]]; then

              # ── pytest parse_suite ───────────────────────────────────────
              POUT=$(pytest test/ -m "parse_suite" -n auto -q --tb=no \
                       -p no:warnings --no-header 2>&1 || true)
              echo "$POUT"
              PYTEST_PASSED=$(echo "$POUT" | grep -oP '\d+(?= passed)' || echo 0)
              PYTEST_FAILED=$(echo "$POUT"  | grep -oP '\d+(?= failed)' || echo 0)
              PYTEST_DURATION=$(echo "$POUT" | grep -oP '(?<=in )\d+\.\d+s' | head -1 || echo n/a)

              # ── cargo bench — only when sqlfluffrs/ changed ───────────────
              RUST_CHANGED="false"
              if [[ -z "$PREV_SHA" ]]; then
                RUST_CHANGED="true"
              elif ! git diff --quiet "$PREV_SHA" "$SHA" -- sqlfluffrs/ 2>/dev/null; then
                RUST_CHANGED="true"
              fi

              if [[ "$RUST_CHANGED" == "true" && -d sqlfluffrs ]]; then
                echo "Rust source changed — running cargo bench"
                cargo bench --manifest-path sqlfluffrs/Cargo.toml --bench parser_bench \
                  2>&1 | tee /tmp/current_bench.txt || true

                BENCH_JSON=$(python3 - << 'PY'
          import json, re
          scale = {"ns": 1, "µs": 1_000, "ms": 1_000_000, "s": 1_000_000_000}
          results = {}
          content = open("/tmp/current_bench.txt").read()
          for m in re.finditer(
              r'^(\S[\w/]+)\s+time:\s+\[[\d.]+ \S+ ([\d.]+) ([a-zµ]+)',
              content, re.M
          ):
              name, value, unit = m.group(1), float(m.group(2)), m.group(3)
              results[name] = round(value * scale.get(unit, 1))
          print(json.dumps(results))
          PY
                )
              else
                echo "Rust source unchanged — skipping cargo bench"
              fi
            fi

            # ── Append result as JSON line ─────────────────────────────────
            SHA="$SHA" SHORT="$SHORT" SUBJECT="$SUBJECT" \
            INSTALL_OK="$INSTALL_OK" \
            PYTEST_PASSED="$PYTEST_PASSED" PYTEST_FAILED="$PYTEST_FAILED" \
            PYTEST_DURATION="$PYTEST_DURATION" \
            BENCH_JSON="$BENCH_JSON" \
            python3 -c "
          import json, os
          e = os.environ
          data = {
              'sha':        e['SHA'],
              'short':      e['SHORT'],
              'subject':    e['SUBJECT'],
              'install_ok': e['INSTALL_OK'] == 'true',
              'pytest': {
                  'passed':   int(e.get('PYTEST_PASSED')  or 0),
                  'failed':   int(e.get('PYTEST_FAILED')  or 0),
                  'duration': e.get('PYTEST_DURATION', 'n/a'),
              },
              'bench': json.loads(e.get('BENCH_JSON', '{}')),
          }
          with open('/tmp/results.jsonl', 'a') as f:
              f.write(json.dumps(data) + '\n')
          "

            PREV_SHA="$SHA"
            echo "::endgroup::"
          done < /tmp/commits.txt
          echo "Benchmark loop complete."

      # ── Job Summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          REPOSITORY: ${{ inputs.repository }}
          BRANCH: ${{ inputs.branch }}
          TOTAL: ${{ steps.range.outputs.total }}
          MERGE_BASE: ${{ steps.range.outputs.merge_base }}
          BL_PASSED: ${{ steps.baseline-pytest.outputs.passed }}
          BL_FAILED: ${{ steps.baseline-pytest.outputs.failed }}
          BL_DURATION: ${{ steps.baseline-pytest.outputs.duration }}
        run: |
          python3 - << 'PY'
          import json, os
          from pathlib import Path

          e            = os.environ
          repo         = e.get("REPOSITORY", "?")
          branch       = e.get("BRANCH", "?")
          total        = e.get("TOTAL", "?")
          merge_base   = e.get("MERGE_BASE", "?")
          bl_passed    = e.get("BL_PASSED", "?")
          bl_failed    = e.get("BL_FAILED", "?")
          bl_duration  = e.get("BL_DURATION", "?")

          rp = Path("/tmp/results.jsonl")
          results = [json.loads(l) for l in rp.read_text().splitlines() if l.strip()] \
                    if rp.exists() else []

          bp = Path("/tmp/baseline_bench.json")
          baseline_bench = json.loads(bp.read_text()) if bp.exists() else {}

          L = []
          def a(s=""): L.append(s)

          a("## Commit-Range Benchmark Report\n")
          a("| | |")
          a("|---|---|")
          a(f"| **Repository** | `{repo}` |")
          a(f"| **Branch** | `{branch}` |")
          a(f"| **Merge-base** | `{merge_base}` |")
          a(f"| **Commits benchmarked** | {len(results)} / {total} |")
          a()

          # ── Baseline ────────────────────────────────────────────────────
          a("### Baseline — `rubytobi/sqlfluff@main`\n")
          a("#### pytest `parse_suite`")
          a(f"Passed: **{bl_passed}** &nbsp; Failed: **{bl_failed}** &nbsp; Duration: {bl_duration}")
          if baseline_bench:
              a()
              a("#### cargo bench")
              a("| Benchmark | Estimate (ns) |")
              a("|-----------|-------------:|")
              for name, ns in sorted(baseline_bench.items()):
                  a(f"| `{name}` | {ns:,} |")
          a()

          # ── Per-commit results ───────────────────────────────────────────
          if not results:
              a("> No results collected.")
          else:
              a("### pytest `parse_suite` — per commit\n")
              a("| Commit | Subject | ✅ Passed | ❌ Failed | Duration |")
              a("|--------|---------|----------:|----------:|----------|")
              for r in results:
                  warn = " ⚠️ install failed" if not r.get("install_ok") else ""
                  pt = r.get("pytest", {})
                  a(f"| `{r['short']}` | {r['subject'][:60]}{warn} "
                    f"| {pt.get('passed', '—')} | {pt.get('failed', '—')} "
                    f"| {pt.get('duration', '—')} |")

              bench_rows = [r for r in results if r.get("bench")]
              if bench_rows:
                  bench_names = sorted({k for r in bench_rows for k in r["bench"]})
                  a()
                  a("### cargo bench — commits where Rust source changed\n")
                  header = "| Commit | Subject | " + " | ".join(f"`{n}`" for n in bench_names) + " |"
                  sep    = "|--------|---------|" + "|".join("---:" for _ in bench_names) + "|"
                  a(header)
                  a(sep)
                  for r in bench_rows:
                      cells = []
                      for n in bench_names:
                          ns = r["bench"].get(n)
                          if ns is None:
                              cells.append("—")
                          else:
                              bns = baseline_bench.get(n)
                              if bns:
                                  pct  = (ns - bns) / bns * 100
                                  icon = "🔺" if pct > 3 else ("🟢" if pct < -3 else "➖")
                                  cells.append(f"{ns:,} {icon} ({pct:+.1f}%)")
                              else:
                                  cells.append(f"{ns:,}")
                      a(f"| `{r['short']}` | {r['subject'][:40]} | " + " | ".join(cells) + " |")

          Path(e["GITHUB_STEP_SUMMARY"]).write_text("\n".join(L) + "\n")
          print("Summary written.")
          PY
